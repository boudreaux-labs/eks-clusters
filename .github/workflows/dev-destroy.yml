name: dev-destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.10"

      - name: Terraform Init
        run: terraform init

      - name: Swap DNS to sleeping page
        run: |
          CF_DOMAIN=$(aws ssm get-parameter --name /app-sleeping/cf_domain --query Parameter.Value --output text)
          CF_ZONE_ID=$(aws ssm get-parameter --name /app-sleeping/cf_hosted_zone_id --query Parameter.Value --output text)
          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name --dns-name boudreauxlabs.com --query "HostedZones[0].Id" --output text | sed 's|/hostedzone/||')
          aws route53 change-resource-record-sets --hosted-zone-id "$HOSTED_ZONE_ID" --change-batch "{
            \"Changes\": [
              {
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"www.boudreauxlabs.com\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"$CF_ZONE_ID\",
                    \"DNSName\": \"$CF_DOMAIN\",
                    \"EvaluateTargetHealth\": false
                  }
                }
              }
            ]
          }"

      - name: Delete cluster-owned load balancers
        run: |
          LB_ARNS=$(aws elbv2 describe-load-balancers --query "LoadBalancers[*].LoadBalancerArn" --output text)
          for ARN in $LB_ARNS; do
            TAGS=$(aws elbv2 describe-tags --resource-arns "$ARN" --query "TagDescriptions[0].Tags" --output json)
            if echo "$TAGS" | grep -q '"elbv2.k8s.aws/cluster".*"eks-dev"'; then
              echo "Deleting ALB: $ARN"
              aws elbv2 delete-load-balancer --load-balancer-arn "$ARN"
            fi
          done
          sleep 30

      - name: Terraform Destroy
        run: |
          export TF_VAR_ci_role_arn="${{ vars.ROLE_ARN }}"
          export TF_VAR_cert_arn="${{ vars.CERT_ARN }}"
          export TF_VAR_my_ip="${{ vars.MY_IP }}"
          export TF_VAR_argocd_admin_password="$(aws secretsmanager get-secret-value --secret-id ArgoAdminPassword --query SecretString --output text | jq -r '.ArgoAdminPassword')"
          terraform destroy -auto-approve
