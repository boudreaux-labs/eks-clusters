apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: application-deployments
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/boudreaux-labs/gitops.git
        revision: main
        directories:
          - path: '*'
  template:
    metadata:
      name: '{{path.basename}}'  # App name derived from directory name
    spec:
      project: default
      source:
        repoURL: https://github.com/boudreaux-labs/gitops.git
        targetRevision: main
        chart: '{{path.basename}}'  # Matches the folder name
        helm:
          valueFiles:
          - values.yaml                      # Default values in chart directory
          - overrides.yaml
          ignoreMissingValueFiles: true
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'         # Namespace matches folder name
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
       

