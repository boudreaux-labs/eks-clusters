server:
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/backend-protocol: HTTPS
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
      alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
      alb.ingress.kubernetes.io/security-groups: sg-xxxxxxxxxxxxx, sg-yyyyyyyyyyyyy
      #Someone said this value wasn't needed. Seems to be based on my testing... 
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:842851109414:certificate/d0347ead-df5b-4d02-8f71-9dbf38284f2c
      external-dns.alpha.kubernetes.io/hostname: argocd-dev.boudreauxlabs.com
  paths:
    - /* 
  tls:
  - hosts:
    - argocd-dev.boudreauxlabs.com
  service:
    type: NodePort