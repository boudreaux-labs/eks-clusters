server:
  additionalApplications:
   - name: cluster-addons
     namespace: argocd
     project: default
     source:
       repoURL: https://gitlab.com/boudreaux-labs/app-deploy.git
       targetRevision: HEAD
       path: addons
       directory:
         recurse: true
     destination:
       server: https://kubernetes.default.svc
     syncPolicy:
       automated:
         prune: false
         selfHeal: false