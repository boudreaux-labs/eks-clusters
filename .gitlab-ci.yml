# Terraform pipeline with custom runner image and OIDC authentication

image:
  name: ${CI_REGISTRY_IMAGE}/terraform-runner:latest
  entrypoint: [""]

variables:
  TF_ROOT: ${ENVIRONMENT}
  TF_STATE_NAME: default
  TF_VAR_ci_role_arn: ${ROLE_ARN}
  TF_HTTP_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
  TF_HTTP_LOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
  TF_HTTP_UNLOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
  TF_HTTP_USERNAME: gitlab-ci-token
  TF_HTTP_PASSWORD: ${CI_JOB_TOKEN}
  TF_HTTP_LOCK_METHOD: POST
  TF_HTTP_UNLOCK_METHOD: DELETE

cache:
  key: "${TF_ROOT}"
  paths:
    - ${TF_ROOT}/.terraform/

# Configure AWS OIDC authentication before each job
default:
  before_script:
    - mkdir -p ~/.aws
    - echo "${MY_OIDC_TOKEN}" > /tmp/web_identity_token
    - echo -e "[profile oidc]\nrole_arn=${ROLE_ARN}\nweb_identity_token_file=/tmp/web_identity_token" > ~/.aws/config
    - export AWS_PROFILE=oidc

stages:
  - build
  - plan
  - apply
  - destroy

# Build and push custom runner image to GitLab Container Registry
build-image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script: []
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(echo -n ${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD} | base64)\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/terraform-runner:latest"
  rules:
    - changes:
        - Dockerfile

.id_token: &id_token
  id_tokens:
    MY_OIDC_TOKEN:
      aud: https://gitlab.com

dev-plan:
  stage: plan
  script:
    - cd dev
    - export TF_VAR_argocd_admin_password=$(aws secretsmanager get-secret-value --secret-id ArgoAdminPassword --query SecretString --output text | jq -r '.ArgoAdminPassword')
    - terraform init
    - terraform plan -out=plan.cache
  artifacts:
    paths:
      - dev/plan.cache
    expire_in: 1 week
  variables:
    ENVIRONMENT: dev
  <<: *id_token

dev-apply:
  stage: apply
  script:
    - cd dev
    - export TF_VAR_argocd_admin_password=$(aws secretsmanager get-secret-value --secret-id ArgoAdminPassword --query SecretString --output text | jq -r '.ArgoAdminPassword')
    - terraform init
    - terraform apply -auto-approve plan.cache
  dependencies:
    - dev-plan
  when: manual
  variables:
    ENVIRONMENT: dev
  <<: *id_token

dev-destroy:
  stage: destroy
  script:
    - cd dev
    - export TF_VAR_argocd_admin_password=$(aws secretsmanager get-secret-value --secret-id ArgoAdminPassword --query SecretString --output text | jq -r '.ArgoAdminPassword')
    - terraform init
    - terraform destroy -auto-approve
  when: manual
  needs: []
  variables:
    ENVIRONMENT: dev
  <<: *id_token
