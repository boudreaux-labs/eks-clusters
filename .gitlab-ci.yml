# Simple Terraform pipeline using HashiCorp official image with OIDC authentication

image:
  name: hashicorp/terraform:1.10
  entrypoint: [""]

variables:
  TF_ROOT: ${ENVIRONMENT}
  TF_STATE_NAME: default
  TF_LOG: DEBUG
  TF_VAR_ci_role_arn: ${ROLE_ARN}
  TF_HTTP_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}"
  TF_HTTP_LOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
  TF_HTTP_UNLOCK_ADDRESS: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}/lock"
  TF_HTTP_USERNAME: gitlab-ci-token
  TF_HTTP_PASSWORD: ${CI_JOB_TOKEN}
  TF_HTTP_LOCK_METHOD: POST
  TF_HTTP_UNLOCK_METHOD: DELETE

cache:
  key: "${TF_ROOT}"
  paths:
    - ${TF_ROOT}/.terraform/

# Configure AWS OIDC authentication before each job
default:
  before_script:
    - apk add --no-cache aws-cli jq
    - mkdir -p ~/.aws
    - echo "${MY_OIDC_TOKEN}" > /tmp/web_identity_token
    - echo -e "[profile oidc]\nrole_arn=${ROLE_ARN}\nweb_identity_token_file=/tmp/web_identity_token" > ~/.aws/config
    - export AWS_PROFILE=oidc

stages:
  - validate
  - plan
  - apply
  - destroy

.id_token: &id_token
  id_tokens:
    MY_OIDC_TOKEN:
      aud: https://gitlab.com

dev-validate:
  stage: validate
  script:
    - cd dev
    - terraform init
    - terraform validate
  variables:
    ENVIRONMENT: dev

dev-plan:
  stage: plan
  script:
    - cd dev
    - export TF_VAR_argocd_admin_password=$(aws secretsmanager get-secret-value --secret-id ArgoAdminPassword --query SecretString --output text | jq -r '.ArgoAdminPassword')
    - terraform init
    - terraform plan -out=plan.cache
  artifacts:
    paths:
      - dev/plan.cache
    expire_in: 1 week
  variables:
    ENVIRONMENT: dev
  <<: *id_token

dev-apply:
  stage: apply
  script:
    - cd dev
    - export TF_VAR_argocd_admin_password=$(aws secretsmanager get-secret-value --secret-id ArgoAdminPassword --query SecretString --output text | jq -r '.ArgoAdminPassword')
    - terraform init
    - terraform apply -auto-approve plan.cache
  when: manual
  dependencies:
    - dev-plan
  variables:
    ENVIRONMENT: dev
  <<: *id_token

dev-destroy:
  stage: destroy
  script:
    - cd dev
    - export TF_VAR_argocd_admin_password=$(aws secretsmanager get-secret-value --secret-id ArgoAdminPassword --query SecretString --output text | jq -r '.ArgoAdminPassword')
    - terraform init
    - terraform destroy -auto-approve
  when: manual
  variables:
    ENVIRONMENT: dev
  <<: *id_token
