#A pipeline thats a combination from stuff I saw at work and my own desire to have all my terraform build as an IAM role that Gitlab assumes (hence the token stuff)

image:
  name: "registry.gitlab.com/gitlab-org/terraform-images/releases/1.5"

variables:
  TF_ROOT: ${ENVIRONMENT}  # The relative path to the root directory of the Terraform project
  TF_STATE_NAME: default      # The name of the state file used by the GitLab Managed Terraform state backend

cache:
  key: "${TF_ROOT}"
  paths:
    - ${TF_ROOT}/.terraform/

#This runs before the 'script block in every job below. It sets the Profile and Web Identity Token, within the AWS config file.
#For this to work you also need to set a Gitlab CICD variable of 'AWS_PROFILE' with a value of 'oidc'. This takes the place of key CICD variables
#We do this so that Gitlab's deployments to AWS occur as the IAM role, not the CICD user. Best security practice and allows someone to us the role and get right into EKS without configmap changes
default:
  before_script: 
  - mkdir -p ~/.aws
  - echo "${MY_OIDC_TOKEN}" > /tmp/web_identity_token
  - echo -e "[profile oidc]\nrole_arn=${ROLE_ARN}\nweb_identity_token_file=/tmp/web_identity_token" > ~/.aws/config
  - cat ~/.aws/config
  - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
  - unzip awscliv2.zip
  - ./aws/install

stages:
  - validate
  - plan
  - apply
  - destroy
  
  
.artifacts: &artifacts
    artifacts:
      name: plan
      paths:
      - ${TF_ROOT}/plan.cache
      - ${TF_ROOT}/plan.json
      reports:
        terraform: ${TF_ROOT}/plan.json

.id_token: &id_token
    id_tokens:
      MY_OIDC_TOKEN:
        aud: https://gitlab.com


dev-validate: 
  stage: validate
  script:
    - cd dev
    - gitlab-terraform init
    - gitlab-terraform validate
  variables:
    ENVIRONMENT: dev    


dev-plan: 
  stage: plan
  script:
    - cd dev
    - gitlab-terraform init
    - gitlab-terraform plan
    - gitlab-terraform plan-json
  variables:
    ENVIRONMENT: dev  
  <<: *artifacts
  <<: *id_token


dev-apply: 
  stage: apply
  script:
    - cd dev
    - gitlab-terraform init
    - gitlab-terraform apply
  when: manual
  variables:
    ENVIRONMENT: dev  
  <<: *artifacts
  <<: *id_token


dev-destroy: 
  stage: destroy
  script:
    - cd dev
    - gitlab-terraform init
    - gitlab-terraform destroy
  when: manual
  variables:
    ENVIRONMENT: dev  
  <<: *artifacts
  <<: *id_token
 
